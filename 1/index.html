<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>射击小游戏 - ShotGod</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #4a9eff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.5);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        canvas#main_canvas {
            pointer-events: auto;
        }
        #bg_canvas { z-index: 1; }
        #role_canvas { z-index: 2; }
        #enemy_canvas { z-index: 3; }
        #particles_canvas { z-index: 4; }
        #r_bullets_canvas { z-index: 5; }
        #main_canvas { z-index: 10; pointer-events: auto; }
        
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #startScreen h1 {
            font-size: 48px;
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            margin-bottom: 20px;
        }
        #startScreen p {
            color: #ccc;
            font-size: 18px;
            margin: 10px 0;
        }
        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        #startButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
        }
        
        #gameInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            z-index: 10;
        }
        #gameInfo div { margin: 5px 0; }
        #gameInfo .score { color: #00ff00; }
        #gameInfo .lives { color: #ff4444; }
        #gameInfo .round { color: #4444ff; }
        
        #health-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            height: 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #4a9eff;
            border-radius: 15px;
            overflow: hidden;
            z-index: 10;
        }
        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.3s ease;
            border-radius: 15px;
        }
        #health-text {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 200px;
            text-align: center;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
            z-index: 11;
            pointer-events: none;
        }
        
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #gameOver h2 {
            font-size: 48px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            margin-bottom: 20px;
        }
        #gameOver p {
            color: #fff;
            font-size: 24px;
            margin: 10px 0;
        }
        #finalScore { color: #00ff00; font-size: 32px; }
        #restartButton {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(90deg, #ff4444, #ff0000);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        #restartButton:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #666;
            font-size: 14px;
            z-index: 10;
        }
        
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: auto;
            z-index: 10;
        }
        #mobile-controls button {
            width: 80px;
            height: 80px;
            font-size: 32px;
            background: rgba(74, 158, 255, 0.3);
            border: 2px solid rgba(74, 158, 255, 0.6);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }
        #mobile-controls button:active,
        #mobile-controls button.active {
            background: rgba(74, 158, 255, 0.6);
            transform: scale(0.95);
        }
        #btn-left {
            margin-left: 20px;
        }
        #btn-right {
            margin-right: 20px;
        }
        #btn-shoot {
            width: 100px;
            height: 100px;
            font-size: 24px;
            background: rgba(255, 71, 87, 0.3);
            border: 2px solid rgba(255, 71, 87, 0.6);
        }
        #btn-shoot:active,
        #btn-shoot.active {
            background: rgba(255, 71, 87, 0.6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>SHOTGOD</h1>
            <p>一款横版射击游戏</p>
            <p>使用 WASD 或 方向键 移动</p>
            <p>点击鼠标或按 J 键射击</p>
            <button id="startButton">开始游戏</button>
        </div>
        
        <!-- 画布层 -->
        <canvas id="bg_canvas"></canvas>
        <canvas id="role_canvas"></canvas>
        <canvas id="enemy_canvas"></canvas>
        <canvas id="r_bullets_canvas"></canvas>
        <canvas id="particles_canvas"></canvas>
        <canvas id="main_canvas"></canvas>
        
        <!-- 游戏信息 -->
        <div id="gameInfo">
            <div>分数: <span class="score" id="score">0</span></div>
            <div>生命值: <span class="lives" id="lives">3</span></div>
            <div>回合: <span class="round" id="round">1</span></div>
        </div>
        
        <!-- 生命值条 -->
        <div id="health-bar">
            <div id="health-fill" style="width: 100%;"></div>
        </div>
        <div id="health-text">HP: 100%</div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button id="restartButton">重新开始</button>
        </div>
        
        <!-- 控制说明 -->
        <div id="controls">
            WASD/方向键: 移动 | 鼠标点击/J键: 射击
        </div>
        
        <!-- 移动端控制按钮 -->
        <div id="mobile-controls">
            <button id="btn-left">◀</button>
            <button id="btn-shoot">🔥</button>
            <button id="btn-right">▶</button>
        </div>
    </div>
    
    <!-- 游戏脚本 -->
    <script src="js/common.js"></script>
    <script src="js/game.js"></script>
    <script src="js/sence.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
